services:
  - type: web
    name: hire-tracker-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python manage.py seed_demo_users"
    startCommand: "gunicorn hiretracker.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        value: change-me-in-production
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://hire-tracker-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://hire-tracker-frontend.onrender.com,https://hire-tracker-backend-95mr.onrender.com
